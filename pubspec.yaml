name: fashiontrend_ai
description: AI-powered personal fashion, grooming, and lifestyle assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI / Styling
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  glassmorphism: ^3.0.0
  animated_bottom_navigation_bar: ^1.3.3
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  card_swiper: ^3.0.1

  # Image & Camera
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  image: ^4.1.7
  flutter_image_compress: ^2.2.0

  # Location & Weather
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Network
  dio: ^5.4.3+1
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Storage & Caching
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0

  # Animations
  rive: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env
  # Note: fonts removed — using google_fonts package instead (no local font files needed)
