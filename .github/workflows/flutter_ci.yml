name: FashionTrend AI — Build Universal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Universal Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # Create .env FIRST before pub get so flutter_dotenv finds it
      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "OPENROUTER_BASE_URL=https://openrouter.ai/api/v1" >> .env
          echo "APP_NAME=FashionTrend AI" >> .env
          echo "APP_VERSION=1.0.0" >> .env
          echo ".env created:"
          cat .env | sed 's/=.*/=***/'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install NDK 25.1.8937393
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos || true

      - name: Build Universal Release APK
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: FashionTrendAI-universal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
